name: Code Coverage

on:
  workflow_dispatch:
  pull_request:
    branches: [master, "[0-9]+.[0-9]+"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE.txt'
      - '.gitignore'
  push:
    branches:
      - master
      - "[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-coverage:
    runs-on: ubuntu-latest
    container: falkordb/falkordb-build:ubuntu
    steps:

    - name: Safe dir
      run: git config --global --add safe.directory '*'

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        set-safe-directory: '*'
        submodules: recursive

    - name: Generate cache key
      id: cache-key
      shell: bash
      run: |
        set -o pipefail
        # build.sh included so that changes to dep build flags (e.g. libcurl SSL) invalidate the cache
        DEPS_HASH=$(cat ./deps/GraphBLAS/Include/GraphBLAS.h ./deps/GraphBLAS/Config/GB_prejit.c ./deps/libcypher-parser/lib/src/parser.c ./deps/RediSearch/src/version.h ./deps/libcurl/RELEASE-NOTES ./deps/libcsv/ChangeLog ./deps/LAGraph/include/LAGraph.h ./deps/rax/rax.h ./deps/xxHash/xxhash.h ./deps/utf8proc/utf8proc.h ./deps/oniguruma/src/oniguruma.h ./deps/FalkorDB-core-rs/Cargo.toml ./build.sh 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "no-hash")
        echo "combined=${DEPS_HASH}" >> "$GITHUB_OUTPUT"

    - name: Restore dependency cache
      id: restore-deps
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
      with:
        path: |
          ./bin/linux-x64-release/GraphBLAS
          ./bin/linux-x64-release/libcypher-parser
          ./bin/linux-x64-debug-cov/search-static
          ./bin/linux-x64-release/libcurl
          ./bin/linux-x64-release/libcsv
          ./bin/linux-x64-release/LAGraph
          ./bin/linux-x64-release/rax
          ./bin/linux-x64-release/xxHash
          ./bin/linux-x64-release/utf8proc
          ./bin/linux-x64-release/oniguruma
          ./bin/linux-x64-debug-cov/FalkorDB-core-rs
        key: deps-coverage-${{ steps.cache-key.outputs.combined }}
        restore-keys: |
          deps-coverage-

    - name: Cache LLVM 17
      id: cache-llvm
      uses: actions/cache@v5
      with:
        path: |
          /usr/lib/llvm-17
          /usr/bin/clang-17
          /usr/bin/clang++-17
          /usr/bin/llvm-profdata-17
          /usr/bin/llvm-cov-17
          /usr/lib/x86_64-linux-gnu/libomp*17*
        key: llvm-17-coverage-ubuntu

    - name: Install LLVM 17
      if: steps.cache-llvm.outputs.cache-hit != 'true'
      run: |
        apt-get update
        apt-get install -y lsb-release wget software-properties-common gnupg
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        ./llvm.sh 17
        apt-get update
        apt-get install -y libomp-17-dev

    - name: Build
      run: |
        rustup default 1.76.0
        apt-get update
        apt-get install -y libc6-dbg python3-venv
        python3 -m venv venv
        . venv/bin/activate
        pip install -r tests/requirements.txt
        curl -fsSL https://packages.redis.io/gpg | gpg --dearmor -o /usr/share/keyrings/redis-archive-keyring.gpg && \
        echo "deb [signed-by=/usr/share/keyrings/redis-archive-keyring.gpg] https://packages.redis.io/deb $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/redis.list
        apt update && apt install redis -y
        update-alternatives \
          --verbose \
          --install /usr/bin/clang                clang                /usr/bin/clang-17 100 \
          --slave   /usr/bin/clang++              clang++              /usr/bin/clang++-17 \
          --slave   /usr/bin/llvm-profdata        llvm-profdata        /usr/bin/llvm-profdata-17 \
          --slave   /usr/bin/llvm-cov             llvm-cov             /usr/bin/llvm-cov-17
        make coverage NPROC=16 CLANG=1 || true

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: codecov.txt
        plugin: noop
        disable_search: true
        verbose: true
