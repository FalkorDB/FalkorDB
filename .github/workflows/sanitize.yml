name: Sanitizer

on:
  workflow_dispatch:
  pull_request:
    branches: [master, "[0-9]+.[0-9]+"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE.txt'
      - '.gitignore'
  push:
    branches:
      - master
      - "[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-sanitizer:
    runs-on: ubuntu-latest
    container: falkordb/falkordb-build:ubuntu
    steps:

    - name: Safe dir
      run: git config --global --add safe.directory '*'

    - uses: actions/checkout@v6
      with:
        set-safe-directory: '*'
        submodules: recursive

    - name: Generate cache key
      id: cache-key
      run: |
        DEPS_HASH=$(cat ./deps/GraphBLAS/Include/GraphBLAS.h ./deps/GraphBLAS/Config/GB_prejit.c ./deps/libcypher-parser/lib/src/parser.c ./deps/RediSearch/src/version.h ./deps/libcurl/RELEASE-NOTES ./deps/libcsv/ChangeLog ./deps/LAGraph/include/LAGraph.h ./deps/rax/rax.h ./deps/xxHash/xxhash.h ./deps/utf8proc/utf8proc.h ./deps/oniguruma/src/oniguruma.h ./deps/FalkorDB-core-rs/Cargo.toml 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "no-hash")
        echo "combined=${DEPS_HASH}" >> "$GITHUB_OUTPUT"

    - name: Restore dependency cache
      id: restore-deps
      uses: actions/cache@v5
      with:
        path: |
          ./bin/linux-x64-release/GraphBLAS
          ./bin/linux-x64-release/libcypher-parser
          ./bin/linux-x64-release/search-static
          ./bin/linux-x64-release/libcurl
          ./bin/linux-x64-release/libcsv
          ./bin/linux-x64-release/LAGraph
          ./bin/linux-x64-release/rax
          ./bin/linux-x64-release/xxHash
          ./bin/linux-x64-release/utf8proc
          ./bin/linux-x64-release/oniguruma
          ./bin/linux-x64-debug-asan/FalkorDB-core-rs
        key: deps-sanitizer-${{ steps.cache-key.outputs.combined }}
        restore-keys: |
          deps-sanitizer-

    - name: Cache LLVM 17
      id: cache-llvm
      uses: actions/cache@v5
      with:
        path: |
          /usr/lib/llvm-17
          /usr/bin/clang-17
          /usr/bin/clang++-17
          /usr/lib/x86_64-linux-gnu/libomp*17*
        key: llvm-17-sanitizer-ubuntu

    - name: Install LLVM 17
      if: steps.cache-llvm.outputs.cache-hit != 'true'
      run: |
        apt-get update
        apt-get install -y lsb-release wget software-properties-common gnupg
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        ./llvm.sh 17
        apt-get update
        apt-get install -y libomp-17-dev

    - name: Build
      run: |
        rustup default nightly
        apt-get update
        apt-get install -y libc6-dbg python3-venv
        python3 -m venv venv
        . venv/bin/activate
        pip install -r tests/requirements.txt
        update-alternatives \
          --verbose \
          --install /usr/bin/clang                clang                /usr/bin/clang-17 100 \
          --slave   /usr/bin/clang++              clang++              /usr/bin/clang++-17
        make CLANG=1 SAN=address NPROC=16

    - name: Upload build output
      uses: actions/upload-artifact@v7
      with:
        name: sanitizer-build
        path: ./bin/linux-x64-debug-asan/
        retention-days: 1
        compression-level: 1

  test-sanitizer:
    needs: build-sanitizer
    runs-on: ubuntu-latest
    container: falkordb/falkordb-build:ubuntu
    strategy:
      fail-fast: false
      matrix:
        test_type: [unit, flow, tck]
    steps:

    - name: Safe dir
      run: git config --global --add safe.directory '*'

    - uses: actions/checkout@v6
      with:
        set-safe-directory: '*'
        submodules: recursive

    - name: Download build artifacts
      uses: actions/download-artifact@v7
      with:
        name: sanitizer-build
        path: ./bin/linux-x64-debug-asan/

    - name: Restore file permissions
      run: |
        chmod -R +x ./bin/linux-x64-debug-asan/ || true
        find ./bin/linux-x64-debug-asan/ -name "*.so" -exec chmod +x {} \;
        find ./bin/linux-x64-debug-asan/ -name "*.sh" -exec chmod +x {} \;

    - name: Generate cache key
      id: cache-key
      run: |
        DEPS_HASH=$(cat ./deps/GraphBLAS/Include/GraphBLAS.h ./deps/GraphBLAS/Config/GB_prejit.c ./deps/libcypher-parser/lib/src/parser.c ./deps/RediSearch/src/version.h ./deps/libcurl/RELEASE-NOTES ./deps/libcsv/ChangeLog ./deps/LAGraph/include/LAGraph.h ./deps/rax/rax.h ./deps/xxHash/xxhash.h ./deps/utf8proc/utf8proc.h ./deps/oniguruma/src/oniguruma.h ./deps/FalkorDB-core-rs/Cargo.toml 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "no-hash")
        echo "combined=${DEPS_HASH}" >> "$GITHUB_OUTPUT"

    - name: Restore dependency cache
      uses: actions/cache@v5
      with:
        path: |
          ./bin/linux-x64-release/GraphBLAS
          ./bin/linux-x64-release/libcypher-parser
          ./bin/linux-x64-release/search-static
          ./bin/linux-x64-release/libcurl
          ./bin/linux-x64-release/libcsv
          ./bin/linux-x64-release/LAGraph
          ./bin/linux-x64-release/rax
          ./bin/linux-x64-release/xxHash
          ./bin/linux-x64-release/utf8proc
          ./bin/linux-x64-release/oniguruma
          ./bin/linux-x64-debug-asan/FalkorDB-core-rs
        key: deps-sanitizer-${{ steps.cache-key.outputs.combined }}
        restore-keys: |
          deps-sanitizer-

    - name: Cache LLVM 17
      id: cache-llvm
      uses: actions/cache@v5
      with:
        path: |
          /usr/lib/llvm-17
          /usr/bin/clang-17
          /usr/bin/clang++-17
          /usr/lib/x86_64-linux-gnu/libomp*17*
        key: llvm-17-sanitizer-ubuntu

    - name: Install LLVM 17
      if: steps.cache-llvm.outputs.cache-hit != 'true'
      run: |
        apt-get update
        apt-get install -y lsb-release wget software-properties-common gnupg
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        ./llvm.sh 17
        apt-get update
        apt-get install -y libomp-17-dev

    - name: Setup test environment
      run: |
        apt-get update
        apt-get install -y libc6-dbg python3-venv
        rustup default nightly
        python3 -m venv venv
        . venv/bin/activate
        pip install -r tests/requirements.txt
        update-alternatives \
          --verbose \
          --install /usr/bin/clang                clang                /usr/bin/clang-17 100 \
          --slave   /usr/bin/clang++              clang++              /usr/bin/clang++-17

    - name: Run ${{ matrix.test_type }} tests
      run: |
        . venv/bin/activate
        make ${{ matrix.test_type }}-tests CLEAR_LOGS=0 SAN=address

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: sanitizer-${{ matrix.test_type }}-test-logs
        path: ./tests/${{ matrix.test_type }}/logs/
        retention-days: 7
