name: Sanitizer

on:
  workflow_dispatch:
  pull_request:
    branches: [master, "[0-9]+.[0-9]+"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE.txt'
      - '.gitignore'
  push:
    branches:
      - master
      - "[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sanitize-test:
    runs-on: ubuntu-latest
    container: falkordb/falkordb-build:ubuntu
    steps:

    - name: Safe dir
      run: git config --global --add safe.directory '*'

    - uses: actions/checkout@v6
      with:
        set-safe-directory: '*'
        submodules: recursive

    - name: Generate cache key
      id: cache-key
      run: |
        DEPS_HASH=$(cat ./deps/GraphBLAS/Include/GraphBLAS.h ./deps/GraphBLAS/Config/GB_prejit.c ./deps/libcypher-parser/lib/src/parser.c ./deps/RediSearch/src/version.h ./deps/libcurl/RELEASE-NOTES ./deps/libcsv/ChangeLog ./deps/LAGraph/include/LAGraph.h ./deps/rax/rax.h ./deps/xxHash/xxhash.h ./deps/utf8proc/utf8proc.h ./deps/oniguruma/src/oniguruma.h ./deps/FalkorDB-core-rs/Cargo.toml 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "no-hash")
        echo "combined=${DEPS_HASH}" >> "$GITHUB_OUTPUT"

    - name: Restore dependency cache
      id: restore-deps
      uses: actions/cache@v5
      with:
        path: |
          ./bin/linux-x64-debug-asan/GraphBLAS
          ./bin/linux-x64-debug-asan/libcypher-parser
          ./bin/linux-x64-debug-asan/search-static
          ./bin/linux-x64-debug-asan/libcurl
          ./bin/linux-x64-debug-asan/libcsv
          ./bin/linux-x64-debug-asan/LAGraph
          ./bin/linux-x64-debug-asan/rax
          ./bin/linux-x64-debug-asan/xxHash
          ./bin/linux-x64-debug-asan/utf8proc
          ./bin/linux-x64-debug-asan/oniguruma
          ./bin/linux-x64-debug-asan/FalkorDB-core-rs
        key: deps-sanitizer-${{ steps.cache-key.outputs.combined }}
        restore-keys: |
          deps-sanitizer-

    - name: Cache LLVM 17
      id: cache-llvm
      uses: actions/cache@v5
      with:
        path: |
          /usr/lib/llvm-17
          /usr/bin/clang-17
          /usr/bin/clang++-17
          /usr/lib/x86_64-linux-gnu/libomp*17*
        key: llvm-17-sanitizer-ubuntu

    - name: Install LLVM 17
      if: steps.cache-llvm.outputs.cache-hit != 'true'
      run: |
        apt-get update
        apt-get install -y lsb-release wget software-properties-common gnupg
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        ./llvm.sh 17
        apt-get update
        apt-get install -y libomp-17-dev

    - name: Build
      run: |
        rustup default nightly
        apt-get update
        apt-get install -y libc6-dbg python3-venv
        python3 -m venv venv
        . venv/bin/activate
        pip install -r tests/requirements.txt
        update-alternatives \
          --verbose \
          --install /usr/bin/clang                clang                /usr/bin/clang-17 100 \
          --slave   /usr/bin/clang++              clang++              /usr/bin/clang++-17
        make CLANG=1 SAN=address NPROC=16

    - name: Unit tests
      id: unit_tests
      run: make unit-tests CLEAR_LOGS=0 SAN=address
      continue-on-error: true

    - uses: actions/upload-artifact@v7
      with:
        name: Upload unit tests logs
        path: ${{ github.workspace }}/tests/unit/logs/
        retention-days: 7

    - name: Flow tests
      id: flow_tests
      run: |
        . venv/bin/activate
        make flow-tests CLEAR_LOGS=0 SAN=address
      continue-on-error: true

    - uses: actions/upload-artifact@v7
      with:
        name: Upload flow tests logs
        path: ${{ github.workspace }}/tests/flow/logs/
        retention-days: 7

    - name: TCK tests
      id: tck_tests
      run: |
        . venv/bin/activate
        make tck-tests CLEAR_LOGS=0 SAN=address
      continue-on-error: true

    - uses: actions/upload-artifact@v7
      with:
        name: Upload TCK tests logs
        path: ${{ github.workspace }}/tests/tck/logs/
        retention-days: 7

    - name: Check on failures
      if: steps.unit_tests.outcome != 'success' || steps.flow_tests.outcome != 'success' || steps.tck_tests.outcome != 'success'
      run: exit 1
