name: Submodule Update

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly, Monday 00:00 UTC
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Discover submodules from .gitmodules
        id: discover
        run: |
          # Parse .gitmodules to build a JSON matrix of {path, upstream} objects.
          # Only includes submodules whose URL points to github.com.
          matrix="[]"
          while read -r key path; do
            name="${key#submodule.}"
            name="${name%.path}"
            url=$(git config --file .gitmodules "submodule.${name}.url")

            # Extract owner/repo from https://github.com/{owner}/{repo}[.git]
            upstream=$(echo "$url" | sed -n 's|^https://github\.com/||p')
            upstream="${upstream%.git}"
            if [ -z "$upstream" ] || ! echo "$upstream" | grep -q '/'; then
              echo "Skipping ${path}: not a github.com URL (${url})"
              continue
            fi

            matrix=$(echo "$matrix" | jq -c --arg p "$path" --arg u "$upstream" '. + [{"path": $p, "upstream": $u}]')
          done < <(git config --file .gitmodules --get-regexp '^submodule\..*\.path$')

          echo "matrix={\"submodule\":${matrix}}" >> "$GITHUB_OUTPUT"
          echo "Discovered submodules:"
          echo "$matrix" | jq .

  check-and-update:
    needs: discover
    if: fromJSON(needs.discover.outputs.matrix).submodule[0] != null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new tag in ${{ matrix.submodule.path }}
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBMODULE_PATH: ${{ matrix.submodule.path }}
          UPSTREAM: ${{ matrix.submodule.upstream }}
        run: |
          SUBMODULE_NAME=$(basename "$SUBMODULE_PATH")

          cd "$SUBMODULE_PATH"

          git fetch --tags

          # Prefer GitHub Releases API to get the latest stable release tag,
          # avoiding pre-release tags and non-release tags (e.g. tiny-curl-*)
          LATEST_TAG=$(gh api "repos/${UPSTREAM}/releases/latest" --jq '.tag_name' 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            # Fallback: version-sort tags, demoting pre-release suffixes (-rc, -beta, etc.)
            LATEST_TAG=$(git -c 'versionsort.suffix=-' tag --sort=-version:refname | head -n1)
          fi

          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found for $SUBMODULE_NAME, skipping."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_SHA=$(git rev-parse "${LATEST_TAG}^{}" 2>/dev/null || git rev-parse "${LATEST_TAG}")
          CURRENT_SHA=$(git rev-parse HEAD)

          echo "Submodule:   $SUBMODULE_NAME"
          echo "Current SHA: $CURRENT_SHA"
          echo "Latest tag:  $LATEST_TAG"
          echo "Latest SHA:  $LATEST_SHA"

          if [ "$CURRENT_SHA" != "$LATEST_SHA" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
            echo "latest_sha=$LATEST_SHA" >> "$GITHUB_OUTPUT"
            echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
            echo "submodule_name=$SUBMODULE_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "$SUBMODULE_NAME is already at the latest tag ($LATEST_TAG), skipping."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update submodule and create PR for ${{ matrix.submodule.path }}
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUBMODULE_PATH: ${{ matrix.submodule.path }}
          UPSTREAM: ${{ matrix.submodule.upstream }}
          SUBMODULE_NAME: ${{ steps.check.outputs.submodule_name }}
          LATEST_TAG: ${{ steps.check.outputs.latest_tag }}
          LATEST_SHA: ${{ steps.check.outputs.latest_sha }}
          CURRENT_SHA: ${{ steps.check.outputs.current_sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH_NAME="submodule-update/${SUBMODULE_NAME}/${LATEST_TAG}"

          # Check if a PR for this branch already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for branch $BRANCH_NAME, skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH_NAME"

          cd "$SUBMODULE_PATH"
          git checkout "$LATEST_TAG"
          cd -

          git add "$SUBMODULE_PATH"
          git commit -m "chore(deps): update ${SUBMODULE_NAME} to ${LATEST_TAG}"

          git push origin "$BRANCH_NAME"

          cat > /tmp/pr_body.md << 'PRBODY'
          ## Submodule Update: `SUBMODULE_NAME_PLACEHOLDER`

          | Field | Value |
          |-------|-------|
          | Submodule | `SUBMODULE_PATH_PLACEHOLDER` |
          | Upstream | [UPSTREAM_PLACEHOLDER](https://github.com/UPSTREAM_PLACEHOLDER) |
          | Old SHA | `CURRENT_SHA_PLACEHOLDER` |
          | New tag | `LATEST_TAG_PLACEHOLDER` |
          | New SHA | `LATEST_SHA_PLACEHOLDER` |

          ---
          *This PR was automatically generated by the submodule-update workflow.*
          PRBODY

          sed -i \
            -e "s|SUBMODULE_NAME_PLACEHOLDER|${SUBMODULE_NAME}|g" \
            -e "s|SUBMODULE_PATH_PLACEHOLDER|${SUBMODULE_PATH}|g" \
            -e "s|UPSTREAM_PLACEHOLDER|${UPSTREAM}|g" \
            -e "s|CURRENT_SHA_PLACEHOLDER|${CURRENT_SHA}|g" \
            -e "s|LATEST_TAG_PLACEHOLDER|${LATEST_TAG}|g" \
            -e "s|LATEST_SHA_PLACEHOLDER|${LATEST_SHA}|g" \
            /tmp/pr_body.md

          # Remove the leading whitespace added for YAML block scalar indentation
          sed -i 's/^          //' /tmp/pr_body.md

          gh pr create \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH_NAME" \
            --title "chore(deps): update ${SUBMODULE_NAME} to ${LATEST_TAG}" \
            --body-file /tmp/pr_body.md
